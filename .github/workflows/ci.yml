name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        # `baselines` (scanorama/inmoose) ships no prebuilt wheels and needs a
        # C/C++ toolchain to build from source; keep CI on the `dev` extra so
        # that install stays fast and doesn't depend on a working compiler.
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check pctrans/ tests/

      - name: Test
        run: uv run pytest tests/ -q -m "not slow and not integration"
